<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Image Compressor</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md">
      <h1 class="text-xl font-bold mb-4 text-center">Compress Images</h1>

      <form id="uploadForm" class="space-y-4">
        <input
          type="file"
          name="images"
          id="images"
          multiple
          class="w-full border p-2 rounded"
        />

        ```
        <button
          type="submit"
          class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600"
        >
          Upload & Compress
        </button>
        ```
      </form>

      <p id="status" class="text-sm text-center mt-4"></p>
    </div>

    <script>
      const form = document.getElementById("uploadForm");
      const status = document.getElementById("status");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const files = document.getElementById("images").files;

        if (!files.length) {
          status.innerText = "Pilih file dulu";
          return;
        }

        const formData = new FormData();
        for (let file of files) {
          formData.append("images", file);
        }

        status.innerText = "Processing...";

        try {
          const res = await fetch("http://localhost:3000/compress", {
            method: "POST",
            body: formData,
          });

          if (!res.ok) throw new Error("Gagal");

          const blob = await res.blob();

          // ===== AUTO DOWNLOAD =====
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "compressed.zip";
          a.click();

          window.URL.revokeObjectURL(url);

          status.innerText = "Download selesai";
        } catch (err) {
          console.error(err);
          status.innerText = "Error";
        }
      });
    </script>
  </body>
</html>
